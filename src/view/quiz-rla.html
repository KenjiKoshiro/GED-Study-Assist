      text: 'What is the main idea of this passage?',

        'Scientists have discovered all species in the Amazon.',
        'The Amazon rainforest is vital to Earth and contains vast biodiversity.',

    {

    {

        'Him and me went to the store.',
        'I and him went to the store.'
      ],
      correct: 1,
      explanation: '"He and I" is correct — use subject pronouns (I, he, she) when the pronoun is the subject of the sentence.'

      explanation: '"The book" is singular, so it takes the singular past-tense verb "was."'
